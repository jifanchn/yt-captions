name: Fetch YouTube Captions

on:
  push:
    branches: [ main ]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch
        run: |
          pip3 install youtube-transcript-api
          python3 -c '
import json
from youtube_transcript_api import YouTubeTranscriptApi

video_id = "cBdlceqzaUQ"
ytt = YouTubeTranscriptApi()

try:
    t = ytt.fetch(video_id, languages=["zh-Hans","zh-CN","zh-TW","en"])
except Exception as e:
    print(f"Error: {e}")
    tlist = ytt.list(video_id)
    if tlist:
        t = next(iter(tlist)).fetch()
    else:
        raise Exception("No transcripts")

result = {
    "video_id": video_id,
    "full_text": " ".join(e.text for e in t)
}

with open("output.json", "w") as f:
    json.dump(result, f, indent=2, ensure_ascii=False)

print(result["full_text"][:5000])
print(f"\nTotal: {len(result['full_text'])} chars")
'
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: output.json
