name: Fetch YouTube Captions

on:
  push:
    branches: [ main ]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch captions
        run: |
          pip3 install youtube-transcript-api
          python3 << 'EOF'
import json
from youtube_transcript_api import YouTubeTranscriptApi

video_id = "cBdlceqzaUQ"
ytt = YouTubeTranscriptApi()

try:
    transcript = ytt.fetch(video_id, languages=["zh-Hans","zh-CN","zh-TW","en"])
except:
    tlist = ytt.list(video_id)
    transcript = next(iter(tlist)).fetch()

result = {
    "video_id": video_id,
    "transcript": [{"start": e.start, "text": e.text} for e in transcript],
    "full_text": " ".join(e.text for e in transcript)
}

with open("output.json", "w") as f:
    json.dump(result, f, indent=2, ensure_ascii=False)

print(result["full_text"][:5000])
print(f"\n---\nTotal characters: {len(result['full_text'])}")
EOF
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: output.json
