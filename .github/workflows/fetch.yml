name: Fetch YouTube Captions

on:
  push:
    branches: [ main ]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Install and fetch
        run: |
          pip3 install youtube-transcript-api
          echo "=== FETCHING TRANSCRIPT ==="
          python3 << 'EOF'
import json
from youtube_transcript_api import YouTubeTranscriptApi

video_id = "cBdlceqzaUQ"
ytt = YouTubeTranscriptApi()

try:
    t = ytt.fetch(video_id, languages=["zh-Hans","zh-CN","zh-TW","en"])
except Exception as e:
    print(f"Primary fetch failed: {e}")
    tlist = ytt.list(video_id)
    if tlist:
        t = next(iter(tlist)).fetch()
    else:
        print("ERROR: No transcripts available")
        exit(1)

full_text = " ".join(e.text for e in t)
print(f"Video ID: {video_id}")
print(f"Total entries: {len(t)}")
print(f"Total characters: {len(full_text)}")
print("\n=== TRANSCRIPT START ===")
print(full_text)
print("=== TRANSCRIPT END ===")
EOF
